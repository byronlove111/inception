[www]
; Utilisateur et groupe sous lesquels php-fpm tourne
user  = www-data
group = www-data

; Écoute sur toutes les IPs sur le port 9000
; NGINX s'y connectera via wordpress:9000 depuis le réseau Docker
listen = 0.0.0.0:9000

; Gestionnaire de processus dynamique — php-fpm crée/détruit des workers selon la charge
pm                   = dynamic
pm.max_children      = 5
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
