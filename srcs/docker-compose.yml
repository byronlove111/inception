services:

  mariadb:
    # Nom de l'image — doit correspondre au nom du service (requis par le sujet)
    image: mariadb
    # Chemin vers le Dockerfile pour construire l'image
    build: ./requirements/mariadb
    container_name: mariadb
    # Redémarre automatiquement en cas de crash
    restart: always
    # Variables d'environnement lues depuis le fichier .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER:     ${MYSQL_USER}
    # Secrets Docker — les mots de passe sont montés dans /run/secrets/
    secrets:
      - db_password
      - db_root_password
    # Monte le volume de la base de données dans le dossier de données MariaDB
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception_network

  wordpress:
    image: wordpress
    build: ./requirements/wordpress
    container_name: wordpress
    restart: always
    environment:
      DOMAIN_NAME:     ${DOMAIN_NAME}
      MYSQL_HOST:      ${MYSQL_HOST}
      MYSQL_DATABASE:  ${MYSQL_DATABASE}
      MYSQL_USER:      ${MYSQL_USER}
      WP_TITLE:        ${WP_TITLE}
      WP_ADMIN_USER:   ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL:  ${WP_ADMIN_EMAIL}
      WP_USER:         ${WP_USER}
      WP_USER_EMAIL:   ${WP_USER_EMAIL}
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    # Monte le volume WordPress dans le dossier servi par NGINX et php-fpm
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_network
    # WordPress doit démarrer après MariaDB
    depends_on:
      - mariadb

  nginx:
    image: nginx
    build: ./requirements/nginx
    container_name: nginx
    restart: always
    # Seul port exposé vers l'extérieur — port 443 uniquement (requis par le sujet)
    ports:
      - "443:443"
    # Partage le volume WordPress pour accéder aux fichiers PHP à servir
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_network
    # NGINX doit démarrer après WordPress
    depends_on:
      - wordpress

# Déclaration des secrets — Docker lit les fichiers et les monte dans /run/secrets/
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt

# Déclaration du réseau bridge — les conteneurs se parlent via les noms de service
networks:
  inception_network:
    driver: bridge

# Déclaration des volumes — stockés dans /home/abbouras/data/ sur la machine hôte
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/abbouras/data/db

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/abbouras/data/wordpress
