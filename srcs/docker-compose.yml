services:

  mariadb:
    image: mariadb
    build: ./requirements/mariadb
    container_name: mariadb
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER:     ${MYSQL_USER}
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception_network

  wordpress:
    image: wordpress
    build: ./requirements/wordpress
    container_name: wordpress
    restart: always
    environment:
      DOMAIN_NAME:     ${DOMAIN_NAME}
      MYSQL_HOST:      ${MYSQL_HOST}
      MYSQL_DATABASE:  ${MYSQL_DATABASE}
      MYSQL_USER:      ${MYSQL_USER}
      WP_TITLE:        ${WP_TITLE}
      WP_ADMIN_USER:   ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL:  ${WP_ADMIN_EMAIL}
      WP_USER:         ${WP_USER}
      WP_USER_EMAIL:   ${WP_USER_EMAIL}
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_network
    depends_on:
      - mariadb

  nginx:
    image: nginx
    build: ./requirements/nginx
    container_name: nginx
    restart: always
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_network
    depends_on:
      - wordpress

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt

networks:
  inception_network:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/abbouras/data/db

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/abbouras/data/wordpress
